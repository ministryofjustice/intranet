name: "CI Build"

on:
  workflow_call:
    outputs:
      registry:
        description: "AWS registry where the ECR is located"
        value: ${{ jobs.image_build.outputs.registry }}
    inputs:
      pipeline:
        description: 'Define the pipeline in use. One of main or qa'
        default: 'main'
        type: string

jobs:
  image_build:
    name: "Build"
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.ecr-login.outputs.registry }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Configuring AWS credentials"
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: "Logging into ECR"
        uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78 # v2.1.2
        id: ecr-login

      - name: "Build & Push to ECR"
        run: |
          
          # ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░
               
          docker image build \
            -t $REGISTRY/$REPOSITORY:fpm-$PIPELINE_TAG-$IMAGE_TAG \
            --build-arg ACF_PRO_LICENSE="$ACF_PRO_LICENSE" --build-arg ACF_PRO_PASS="$ACF_PRO_PASS"     \
            --build-arg AS3CF_PRO_USER="$AS3CF_PRO_USER"   --build-arg AS3CF_PRO_PASS="$AS3CF_PRO_PASS" \
            --build-arg IMAGE_TAG="$IMAGE_TAG" \
            --target build-fpm .
          
          docker image build \
            -t $REGISTRY/$REPOSITORY:nginx-$PIPELINE_TAG-$IMAGE_TAG \
            --build-arg ACF_PRO_LICENSE="$ACF_PRO_LICENSE" --build-arg ACF_PRO_PASS="$ACF_PRO_PASS"     \
            --build-arg AS3CF_PRO_USER="$AS3CF_PRO_USER"   --build-arg AS3CF_PRO_PASS="$AS3CF_PRO_PASS" \
            --target build-nginx .

          docker image build \
            -t $REGISTRY/$REPOSITORY:s3-push-$PIPELINE_TAG-$IMAGE_TAG \
            --build-arg ACF_PRO_LICENSE --build-arg ACF_PRO_PASS   \
            --build-arg AS3CF_PRO_USER  --build-arg AS3CF_PRO_PASS \
            --build-arg IMAGE_TAG \
            --target build-s3-push .

          # ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░
          
          docker image push $REGISTRY/$REPOSITORY:fpm-$PIPELINE_TAG-$IMAGE_TAG
          docker image push $REGISTRY/$REPOSITORY:nginx-$PIPELINE_TAG-$IMAGE_TAG
          docker image push $REGISTRY/$REPOSITORY:s3-push-$PIPELINE_TAG-$IMAGE_TAG
          
          # ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░

        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          PIPELINE_TAG: ${{ inputs.pipeline }}
          ACF_PRO_LICENSE: ${{ secrets.ACF_PRO_LICENSE }}
          ACF_PRO_PASS: ${{ secrets.ACF_PRO_PASS }}
          AS3CF_PRO_USER: ${{ secrets.AS3CF_PRO_USER }}
          AS3CF_PRO_PASS: ${{ secrets.AS3CF_PRO_PASS }}
